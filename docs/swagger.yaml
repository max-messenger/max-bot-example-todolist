basePath: /
definitions:
  domain.Todo:
    properties:
      created:
        type: string
      done:
        type: boolean
      id:
        format: int64
        type: integer
      message:
        type: string
      userID:
        format: int64
        type: integer
    type: object
  todolistctrl.createRequest:
    properties:
      message:
        type: string
      user_id:
        type: integer
    type: object
  todolistctrl.createResponse:
    properties:
      id:
        type: integer
    type: object
  todolistctrl.deleteRequest:
    properties:
      id:
        type: integer
      user_id:
        type: integer
    type: object
  todolistctrl.listResponse:
    properties:
      todos:
        items:
          $ref: '#/definitions/domain.Todo'
        type: array
    type: object
  todolistctrl.toggleRequest:
    properties:
      done:
        type: boolean
      id:
        type: integer
      user_id:
        type: integer
    type: object

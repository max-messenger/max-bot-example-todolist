          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: get todo list
      tags:
      - todo
  /v1/todos/toggle:
    post:
      consumes:
      - application/json
      parameters:
      - description: request body
        in: body
        name: request

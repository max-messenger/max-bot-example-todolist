    post:
      consumes:
      - application/json
      description: create new todo record
      parameters:
      - description: request body
        in: body
        name: request
        schema:
          $ref: '#/definitions/todolistctrl.createRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/todolistctrl.createResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: add todo
      tags:
      - todo
  /v1/todos/delete:
    post:
      consumes:
      - application/json
      description: delete by user_id and id
      parameters:
      - description: request body
        in: body
        name: request
        schema:
          $ref: '#/definitions/todolistctrl.deleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            format: int64
            type: integer
        "400":
          description: Bad Request
          schema:
            type: string
        "403":
          description: Forbidden
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: delete todo
      tags:
      - todo
  /v1/todos/list:
    post:
      consumes:
      - application/json
      description: get all todo records
      produces:
      - application/json
      responses:
        "200":
          description: OK
